name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: "3.14"
  NODE_VERSION: "20"
  PNPM_VERSION: "9"

jobs:
  # ── Backend: lint, test, type-check ──────────────────────────────────
  backend:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: ai_recruitment
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

      qdrant:
        image: qdrant/qdrant:latest
        ports:
          - 6333:6333
          - 6334:6334
        options: >-
          --health-cmd "curl -f http://localhost:6333/health || exit 1"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    defaults:
      run:
        working-directory: apps/api

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: apps/api/requirements.txt

      - name: Install Python dependencies
        run: |
          pip install uv
          uv pip install -r requirements.txt --system

      - name: Ruff lint
        run: |
          uv pip install ruff --system
          ruff check apps/api/ --output-format=github

      - name: Install bandit
        run: uv pip install bandit --system

      - name: Bandit security scan
        run: bandit -r apps/api/app/ -f custom -q 2>&1 || true
        continue-on-error: true

      - name: Secret scan
        run: |
          grep -rn 'sk-[A-Za-z0-9]\{20,\}' --include='*.py' --include='*.ts' . || echo "No secrets found"
          grep -rn 'api_key\|API_KEY\|api-key' --include='*.py' --include='*.ts' . || echo "No api_key patterns found"
        continue-on-error: true

      - name: Check env keys (v1.0a, Momus §3.1 P0)
        run: python3 scripts/check_env_keys.py --strict
        continue-on-error: false

      - name: Check import health
        run: |
          python -c "
          from app.main import app
          print(f'FastAPI app loaded: {app.title}')
          "
        env:
          DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/ai_recruitment
          REDIS_URL: redis://localhost:6379/0
          QDRANT_URL: http://localhost:6333
          LLM_PROVIDER: omlx
          LLM_BASE_URL: http://localhost:8001/v1
          LLM_API_KEY: test-key
          LLM_MODEL: qwen3.6
          JWT_SECRET: ci-test-jwt-secret
          JWT_ALGORITHM: HS256
          JWT_EXPIRATION_MINUTES: 60
          API_PORT: 8000
          CORS_ORIGINS: '["http://localhost:3000"]'

      - name: Run Alembic migration
        run: |
          alembic upgrade head
        env:
          DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/ai_recruitment
          REDIS_URL: redis://localhost:6379/0
          QDRANT_URL: http://localhost:6333
          LLM_PROVIDER: omlx
          LLM_BASE_URL: http://localhost:8001/v1
          LLM_API_KEY: test-key
          LLM_MODEL: qwen3.6
          JWT_SECRET: ci-test-jwt-secret
          JWT_ALGORITHM: HS256
          JWT_EXPIRATION_MINUTES: 60
          API_PORT: 8000
          CORS_ORIGINS: '["http://localhost:3000"]'

      - name: Run pytest
        run: |
          python -m pytest tests/ -v --tb=short --no-header 2>&1 | tail -20

      - name: Run pytest with coverage
        run: |
          python -m pytest tests/ --cov=app --cov-report=term-missing \
            --cov-fail-under=80 --durations=5 2>&1 | tail -40
        env:
          DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/ai_recruitment
          REDIS_URL: redis://localhost:6379/0
          QDRANT_URL: http://localhost:6333
          LLM_PROVIDER: omlx
          LLM_BASE_URL: http://localhost:8001/v1
          LLM_API_KEY: test-key
          LLM_MODEL: qwen3.6
          JWT_SECRET: ci-test-jwt-secret
          JWT_ALGORITHM: HS256
          JWT_EXPIRATION_MINUTES: 60
          API_PORT: 8000
          CORS_ORIGINS: '["http://localhost:3000"]'

  # ── Frontend: lint + build ───────────────────────────────────────────
  frontend:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: apps/web

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
          run_install: false

      - name: Get pnpm store directory
        run: echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ${{ env.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile
        working-directory: ${{ github.workspace }}

      - name: Lint
        run: pnpm lint
        continue-on-error: true   # next lint is advisory; don't block on lint warnings

      - name: pnpm audit
        run: pnpm audit --audit-level=high || true
        working-directory: ${{ github.workspace }}

      - name: TypeScript type-check
        run: npx tsc --noEmit

      - name: Build
        run: pnpm build
        working-directory: ${{ github.workspace }}
        env:
          NEXT_PUBLIC_API_URL: http://localhost:8000
          NEXT_PUBLIC_WS_URL: ws://localhost:8000

  # ── Docker: build validation ──────────────────────────────────────────
  docker:
    runs-on: ubuntu-latest
    needs: [backend]

    steps:
      - uses: actions/checkout@v4

      - name: Build API Docker image
        run: docker build -t ai-recruitment-api apps/api/

      - name: Build Web Docker image
        run: docker build -t ai-recruitment-web -f apps/web/Dockerfile .

  # ── E2E: Playwright browser tests ──────────────────────────────────────
  e2e:
    runs-on: ubuntu-latest
    needs: [backend, frontend, docker]

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: ai_recruitment
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

      qdrant:
        image: qdrant/qdrant:latest
        ports:
          - 6333:6333
          - 6334:6334
        options: >-
          --health-cmd "curl -f http://localhost:6333/healthz || exit 1"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    defaults:
      run:
        working-directory: apps/web

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: apps/api/requirements.txt

      - name: Install uv
        run: pip install uv

      - name: Install Python dependencies
        run: uv pip install -r ../../apps/api/requirements.txt --system
        working-directory: apps/web

      - name: Set up Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
          run_install: false

      - name: Get pnpm store directory
        run: echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ${{ env.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile
        working-directory: ${{ github.workspace }}

      - name: Install Playwright browsers
        run: npx playwright install chromium
        working-directory: apps/web
        env:
          PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: 0

      - name: Run Alembic migration
        run: |
          cd ${{ github.workspace }}/apps/api
          alembic upgrade head
        env:
          DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/ai_recruitment
          REDIS_URL: redis://localhost:6379/0
          QDRANT_URL: http://localhost:6333
          LLM_PROVIDER: omlx
          LLM_BASE_URL: http://localhost:8001/v1
          LLM_API_KEY: test-key
          LLM_MODEL: qwen3.6
          JWT_SECRET: ci-e2e-jwt-secret
          JWT_ALGORITHM: HS256
          JWT_EXPIRATION_MINUTES: 60
          API_PORT: 8000
          CORS_ORIGINS: '["http://localhost:3000"]'

      - name: Start API server (background)
        run: |
          cd ${{ github.workspace }}/apps/api
          nohup uvicorn app.main:app --host 0.0.0.0 --port 8000 > /tmp/api.log 2>&1 &
          echo "API_PID=$!"
          for i in $(seq 1 15); do
            curl -s -o /dev/null http://localhost:8000/docs && echo "API ready" && break
            sleep 2
          done
        env:
          DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/ai_recruitment
          REDIS_URL: redis://localhost:6379/0
          QDRANT_URL: http://localhost:6333
          LLM_PROVIDER: omlx
          LLM_BASE_URL: http://localhost:8001/v1
          LLM_API_KEY: test-key
          LLM_MODEL: qwen3.6
          JWT_SECRET: ci-e2e-jwt-secret
          JWT_ALGORITHM: HS256
          JWT_EXPIRATION_MINUTES: 60
          API_PORT: 8000
          CORS_ORIGINS: '["http://localhost:3000"]'

      - name: Run Playwright E2E tests
        run: npx playwright test --reporter=list
        env:
          API_URL: http://localhost:8000/api/v1

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: apps/web/playwright-report/
          retention-days: 7
