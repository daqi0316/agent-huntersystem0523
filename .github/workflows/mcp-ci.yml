# MCP CI workflow（v4 PR-5）
# 跑：check_mcp_servers.py + pytest + health-check
# 任何一步失败 → CI 红色

name: MCP CI

on:
  push:
    branches: [main, develop]
    paths:
      - "apps/api/app/mcp/**"
      - "apps/api/app/mcp_servers/**"
      - "apps/api/app/tools/**"
      - "apps/api/app/skills/**"
      - "apps/api/app/core/mcp_alerts.py"
      - "scripts/check_mcp_servers.py"
      - "scripts/health-check.sh"
      - ".pre-commit-config.yaml"
      - ".github/workflows/mcp-ci.yml"
  pull_request:
    branches: [main, develop]

jobs:
  static-check:
    name: Static check (MCP tool schema, skills, config)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.14"
          cache: pip
      - name: Install dependencies
        working-directory: apps/api
        run: |
          python -m pip install uv
          uv venv .venv
          source .venv/bin/activate
          uv pip install -r requirements.txt
      - name: Run check_mcp_servers.py
        working-directory: apps/api
        run: |
          source .venv/bin/activate
          python ../scripts/check_mcp_servers.py --quick

  unit-tests:
    name: Unit + Integration tests (MCP)
    runs-on: ubuntu-latest
    needs: static-check
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.14"
          cache: pip
      - name: Install dependencies
        working-directory: apps/api
        run: |
          python -m pip install uv
          uv venv .venv
          source .venv/bin/activate
          uv pip install -r requirements.txt
      - name: Run pytest
        working-directory: apps/api
        run: |
          source .venv/bin/activate
          .venv/bin/python -m pytest tests/mcp/ -v --tb=short

  health-check:
    name: System health check (6 steps + MCP server)
    runs-on: ubuntu-latest
    needs: unit-tests
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: test
        ports: ["5432:5432"]
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7
        ports: ["6379:6379"]
      qdrant:
        image: qdrant/qdrant:latest
        ports: ["6333:6333"]
      minio:
        image: minio/minio:latest
        env:
          MINIO_ROOT_USER: minio
          MINIO_ROOT_PASSWORD: minio123
        ports: ["9000:9000"]
        options: --health-cmd "curl -f http://localhost:9000/minio/health/ready" --health-interval 10s --health-timeout 5s --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.14"
          cache: pip
      - name: Install dependencies
        working-directory: apps/api
        run: |
          python -m pip install uv
          uv venv .venv
          source .venv/bin/activate
          uv pip install -r requirements.txt
      - name: Run migrations
        working-directory: apps/api
        run: |
          source .venv/bin/activate
          alembic upgrade head
        env:
          DATABASE_URL: postgresql+asyncpg://test:test@localhost:5432/test
      - name: Start API
        working-directory: apps/api
        run: |
          source .venv/bin/activate
          nohup .venv/bin/python -m uvicorn app.main:app --host 127.0.0.1 --port 8000 >/tmp/api.log 2>&1 &
          sleep 10  # 等启动
      - name: Health check
        run: |
          chmod +x scripts/health-check.sh scripts/health-check-load.sh
          bash scripts/health-check.sh
      - name: Health check load (rate limit + MCP)
        run: |
          bash scripts/health-check-load.sh

  # A2: 14 server 端到端 e2e (v0.4e 14 server lifecycle)
  e2e-14-servers:
    name: MCP 14 server e2e lifecycle
    runs-on: ubuntu-latest
    needs: static-check
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.14"
          cache: pip
      - name: Install dependencies
        working-directory: apps/api
        run: |
          python -m pip install uv
          uv venv .venv
          source .venv/bin/activate
          uv pip install -r requirements.txt
      - name: Run 14 server e2e
        working-directory: apps/api
        run: |
          source .venv/bin/activate
          python ../scripts/mcp_v4_e2e_14_servers.py
        env:
          # 14 server 测不需要外部服务 (subprocess + stdio), 但 env vars 防默认加载
          DATABASE_URL: postgresql+asyncpg://test:test@localhost:5432/test
          REDIS_URL: redis://localhost:6379/0
          QDRANT_URL: http://localhost:6333

  # A2: 性能 baseline + 阈值门禁 (Momus §1.2 阶段 3)
  perf-baseline:
    name: Performance baseline (cold start + hot call thresholds)
    runs-on: ubuntu-latest
    needs: e2e-14-servers
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.14"
          cache: pip
      - name: Install dependencies
        working-directory: apps/api
        run: |
          python -m pip install uv
          uv venv .venv
          source .venv/bin/activate
          uv pip install -r requirements.txt
      - name: Run perf baseline (3 rounds x 10 trials)
        working-directory: apps/api
        run: |
          source .venv/bin/activate
          python ../scripts/perf_baseline.py --rounds 3 --trials 10 --skip-http --output /tmp/perf-baseline.json
      - name: Threshold gate (Momus §1.2 阶段 3)
        run: |
          python3 -c "
          import json
          data = json.load(open('/tmp/perf-baseline.json'))
          cold = [r for r in data if r['category'] == 'mcp_cold_start']
          hot = [r for r in data if r['category'] == 'mcp_hot_call']

          # 阈值: 冷启动 P95 < 1.2s (实测 max 903ms × 1.3 buffer, 见 docs/perf-baseline-2026-06-07.md)
          slow_cold = [r for r in cold if r['p95_ms'] > 1200]
          # 阈值: 热调用 P95 < 50ms (实测 4ms × 12 buffer)
          slow_hot = [r for r in hot if r['p95_ms'] > 50]
          # 阈值: 平均冷启动 P50 < 800ms
          avg_cold_p50 = sum(r['p50_ms'] for r in cold) / max(len(cold), 1)
          slow_avg = avg_cold_p50 > 800

          if slow_cold:
              print(f'❌ {len(slow_cold)} cold-start > 1.2s:')
              for r in slow_cold:
                  print(f'  - {r[\"target\"]}: P95={r[\"p95_ms\"]:.0f}ms')
          if slow_hot:
              print(f'❌ {len(slow_hot)} hot call > 50ms:')
              for r in slow_hot:
                  print(f'  - {r[\"target\"]}: P95={r[\"p95_ms\"]:.0f}ms')
          if slow_avg:
              print(f'❌ avg cold-start P50={avg_cold_p50:.0f}ms > 800ms')

          if slow_cold or slow_hot or slow_avg:
              exit(1)
          print(f'✅ perf baseline OK (avg cold P50={avg_cold_p50:.0f}ms, max cold P95={max(r[\"p95_ms\"] for r in cold):.0f}ms)')
          "
      - name: Upload perf baseline JSON
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: perf-baseline-json
          path: /tmp/perf-baseline.json
          retention-days: 30
