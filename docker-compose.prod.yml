x-logging: &default-logging
  driver: "json-file"
  options:
    max-size: "10m"
    max-file: "5"

x-restart: &default-restart
  restart: unless-stopped

services:
  postgres:
    image: postgres:16-alpine
    container_name: ai-recruitment-pg-prod
    environment:
      POSTGRES_USER: ${POSTGRES_USER:?required}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?required}
      POSTGRES_DB: ${POSTGRES_DB:-ai_recruitment}
    volumes:
      - pgdata_prod:/var/lib/postgresql/data
      - ./scripts/backup:/backup:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5
    logging: *default-logging
    restart: *default-restart
    networks:
      - backend

  redis:
    image: redis:7-alpine
    container_name: ai-recruitment-redis-prod
    command: redis-server --appendonly yes --maxmemory 512mb --maxmemory-policy allkeys-lru
    volumes:
      - redisdata_prod:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    logging: *default-logging
    restart: *default-restart
    networks:
      - backend

  qdrant:
    image: qdrant/qdrant:latest
    container_name: ai-recruitment-qdrant-prod
    volumes:
      - qdrantdata_prod:/qdrant/storage
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6333/healthz"]
      interval: 15s
      timeout: 5s
      retries: 5
    logging: *default-logging
    restart: *default-restart
    networks:
      - backend

  minio:
    image: minio/minio:latest
    container_name: ai-recruitment-minio-prod
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:?required}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:?required}
    volumes:
      - miniodata_prod:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 15s
      timeout: 5s
      retries: 5
    logging: *default-logging
    restart: *default-restart
    networks:
      - backend

  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    image: ai-recruitment/api:${API_IMAGE_TAG:-latest}
    container_name: ai-recruitment-api-prod
    env_file:
      - .env.prod
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-ai_recruitment}
      DATABASE_URL_SYNC: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-ai_recruitment}
      REDIS_URL: redis://redis:6379/0
      QDRANT_URL: http://qdrant:6333
      MINIO_ENDPOINT: minio:9000
      LLM_BASE_URL: ${LLM_BASE_URL:-http://host.docker.internal:8000/v1}
      LLM_PROVIDER: ${LLM_PROVIDER:-omlx}
      CORS_ORIGINS: ${CORS_ORIGINS}
      WECHAT_MOCK_MODE: ${WECHAT_MOCK_MODE:-false}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      qdrant:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8000/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s
    logging: *default-logging
    restart: *default-restart
    networks:
      - backend
    deploy:
      resources:
        limits:
          memory: 2G
        reservations:
          memory: 512M

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
        NEXT_PUBLIC_WS_URL: ${NEXT_PUBLIC_WS_URL}
    image: ai-recruitment/web:${WEB_IMAGE_TAG:-latest}
    container_name: ai-recruitment-web-prod
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
      NEXT_PUBLIC_WS_URL: ${NEXT_PUBLIC_WS_URL}
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3000/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    logging: *default-logging
    restart: *default-restart
    networks:
      - backend
    deploy:
      resources:
        limits:
          memory: 1.5G

  nginx:
    build:
      context: ./docker-assets
      dockerfile: Dockerfile.nginx
    image: ai-recruitment/nginx:${NGINX_IMAGE_TAG:-latest}
    container_name: ai-recruitment-nginx-prod
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - api
      - web
    volumes:
      - ./docker-assets/nginx-prod.conf:/etc/nginx/conf.d/default.conf:ro
      - ${SSL_CERTS_DIR:-./docker-assets/ssl}:/etc/nginx/ssl:ro
    logging: *default-logging
    restart: *default-restart
    networks:
      - backend
      - frontend

networks:
  backend:
    driver: bridge
  frontend:
    driver: bridge

volumes:
  pgdata_prod:
  redisdata_prod:
  qdrantdata_prod:
  miniodata_prod:
