services:
  postgres:
    image: postgres:16-alpine
    container_name: ai-recruitment-pg
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: ai_recruitment
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  qdrant:
    image: qdrant/qdrant:latest
    container_name: ai-recruitment-qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6333/healthz"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: ai-recruitment-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    container_name: ai-recruitment-minio
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile.dev
    container_name: ai-recruitment-api
    ports:
      - "8000:8000"
    volumes:
      - ./apps/api:/app
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@postgres:5432/ai_recruitment
      DATABASE_URL_SYNC: postgresql://postgres:postgres@postgres:5432/ai_recruitment
      REDIS_URL: redis://redis:6379/0
      QDRANT_URL: http://qdrant:6333
      MINIO_ENDPOINT: minio:9000
      LLM_BASE_URL: http://vllm:8000/v1
      CORS_ORIGINS: '["http://localhost:3000"]'
      LLM_PROVIDER: omlx
      JWT_SECRET: dev-secret-change-in-production
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      qdrant:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 5
    profiles:
      - full

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile.dev
    container_name: ai-recruitment-web
    ports:
      - "3000:3000"
    volumes:
      - .:/app
      # Prevent host node_modules/.next from shadowing the container's
      # (pnpm install inside container produces platform-correct binaries)
      - /app/node_modules
      - /app/apps/web/node_modules
      - /app/apps/web/.next
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
      NEXT_PUBLIC_WS_URL: ws://localhost:8000
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3000"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s
    depends_on:
      api:
        condition: service_started
    profiles:
      - full

  parse_worker:
    build:
      context: ./apps/api
      dockerfile: Dockerfile.dev
    container_name: ai-recruitment-parse-worker
    command: ["rq", "worker", "parse_queue", "--url", "redis://redis:6379/0"]
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@postgres:5432/ai_recruitment
      DATABASE_URL_SYNC: postgresql://postgres:postgres@postgres:5432/ai_recruitment
      REDIS_URL: redis://redis:6379/0
      LLM_BASE_URL: http://vllm:8000/v1
      LLM_PROVIDER: omlx
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    profiles:
      - full

volumes:
  pgdata:
  qdrant_data:
  redis_data:
  minio_data:
