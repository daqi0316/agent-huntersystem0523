repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.11.0
    hooks:
      - id: ruff
        args: [--fix]
        types_or: [python, pyi]
      - id: ruff-format
        types_or: [python, pyi]

  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml

  # 防止 model 模式 bug 复发（2026-06-03 enum 500 + schema 漂移 500 事件）
  # 规则：
  #   1. 小写 DB label 的 enum 必须用 enum_column() 工厂（强制 values_callable）
  #   2. 生产阻塞 model（approvals/recommendations/command_audit_log）不得用 UUID(as_uuid=False)
  - repo: local
    hooks:
      - id: check-model-patterns
        name: Check SQLAlchemy model patterns (no bare SAEnum, no UUID-as-string in blocked models)
        entry: python3 scripts/check_model_patterns.py
        language: system
        pass_filenames: false
        types_or: [python]

  # MCP 工具系统 CI 守门（v4 V-4）
  # 检查：tool schema / handler / capability / config / skill 完整性
  # 用 venv python（项目依赖 asyncpg / openai / qdrant_client 等）
  - repo: local
    hooks:
      - id: check-mcp-servers
        name: Check MCP servers (schema/handler/capability/config consistency, v4 V-4)
        entry: bash -c 'cd apps/api && ../../apps/api/.venv/bin/python ../../scripts/check_mcp_servers.py --quick'
        language: system
        pass_filenames: false
        types_or: [python, json]
        # 不阻断 commit（CI 抓出问题但不挡 dev 流程）；CI 上跑 strict 模式
        stages: [manual]

  - repo: local
    hooks:
      - id: check-env-keys
        name: Check env keys (apps/api + apps/web vs .env.example)
        entry: python3 scripts/check_env_keys.py
        language: system
        pass_filenames: false
        types_or: [python, ts, tsx, js, jsx]
        stages: [manual]

  # A6 ship report 模板 lint 集成 (Phase A 推后 5 修):
  # check_ship_report.py 验 9 章节 + 5 强约束 + 命名格式 + 引用, 仅匹配 docs/mcp-v4-v*.md
  - repo: local
    hooks:
      - id: check-ship-report
        name: Check ship report template (9 sections + 5 强约束, A6)
        entry: python3 scripts/check_ship_report.py
        language: system
        pass_filenames: true
        files: ^docs/mcp-v4-v.*\.md$
        stages: [pre-commit, manual]
